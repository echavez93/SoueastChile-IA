<style>
  /* App-shell helpers — Tweak: Desktop ↔ Mobile viewport */
  html, body { background: var(--color-ink); }
  .app {
    background: #fff;
    min-height: 100vh;
    margin: 0 auto;
    transition: max-width 280ms var(--ease-out), box-shadow 280ms;
  }
  .app[data-vp="desktop"] { max-width: 100%; }
  .app[data-vp="mobile"] {
    max-width: 420px;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
    /* simulate mobile viewport sizes */
    --container-pad: 20px;
    --fs-section: 22px;
    --fs-h2: 24px;
    --fs-eyebrow: 18px;
    --fs-hero: 22px;
    --fs-h3: 20px;
    --fs-h4: 18px;
    --fs-h5: 16px;
    --nav-h: 56px;
  }
  /* When in mobile-vp simulator, force the nav-links + right links to mobile mode */
  .app[data-vp="mobile"] .nav-links { display: none !important; }
  .app[data-vp="mobile"] .nav-right a:nth-child(3),
  .app[data-vp="mobile"] .nav-right span { display: none !important; }
  .app[data-vp="mobile"] .nav-right a { font-size: 13px; }
  .app[data-vp="mobile"] .modelos__nuevo { top: 56px; }
  .app[data-vp="mobile"] .noticias__grid { grid-template-columns: 1fr !important; gap: 32px; }
  .app[data-vp="mobile"] .qh__row { grid-template-columns: 1fr !important; gap: 8px; }
  .app[data-vp="mobile"] .seg__grid { grid-template-columns: 1fr !important; }
  .app[data-vp="mobile"] .desc { grid-template-columns: 1fr !important; gap: 32px; padding: 48px var(--container-pad); }
  .app[data-vp="mobile"] .col__grid { grid-template-columns: 1fr !important; }
  .app[data-vp="mobile"] .cot__form { grid-template-columns: 1fr !important; }
  .app[data-vp="mobile"] .ft__cols { grid-template-columns: 1fr !important; }

  /* Page switcher tabs */
  .page-tabs {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 200;
    display: inline-flex;
    gap: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(12px);
    border-radius: 100px;
    padding: 4px;
    pointer-events: auto;
  }
  .page-tabs button {
    padding: 8px 16px; font-family: Montserrat; font-size: 12px;
    color: rgba(255,255,255,0.7); border-radius: 100px;
    letter-spacing: 0.08em; transition: all 200ms var(--ease-out);
  }
  .page-tabs button.is-active { background: var(--color-primary); color: #fff; }
  .page-tabs button:hover:not(.is-active) { color: #fff; }

<body>

<div id="root"></div>

  };

<!-- Servicios compartidos -->
<script src="shared/services/env.js"></script>

<!-- Shared components (load order matters: Icons + Logo + CTA before consumers) -->
<script type="text/babel" src="shared/components/useStrapi.jsx"></script>
<script type="text/babel" src="shared/components/Icons.jsx"></script>
<script type="text/babel" src="shared/components/Logo.jsx"></script>
<script type="text/babel" src="shared/components/CTA.jsx"></script>
<script type="text/babel" src="shared/components/Navbar.jsx"></script>
<script type="text/babel" src="shared/components/MegaMenu.jsx"></script>
<script type="text/babel" src="shared/components/Footer.jsx"></script>
<script type="text/babel" src="shared/components/WhatsAppWidget.jsx"></script>

<!-- Pages -->
<script type="text/babel" src="features/home/Home.jsx"></script>
<script type="text/babel" src="features/modelo/Modelo.jsx"></script>

<!-- App -->
<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "viewport": "desktop",
  "menuState": "initial"
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = React.useState("home");
  const [menuOpen, setMenuOpen] = React.useState(false);

  // Bloomreach — init + page_visit en cada cambio de página
  React.useEffect(() => {
    if (window.bloomreachService) {
      window.bloomreachService.initBloomreach();
    }
  }, []);
  React.useEffect(() => {
    if (window.bloomreachService) {
      window.bloomreachService.trackEvent("page_visit", {
        page: page,
        url: window.location.href,
        title: document.title,
      });
    }
  }, [page]);

  // Smooth in-page anchor handling
  React.useEffect(() => {
    const onClick = (e) => {
      const a = e.target.closest('a[href^="#"]');
      if (!a) return;
      const href = a.getAttribute('href');
      if (href === '#' || href.length < 2) return;
      // Cross-page targets: switch then scroll
      const cotizar = href === '#cotizar';
      const modelo = href === '#modelo' || href === '#s06';
      if (modelo && page !== 'modelo') {
        e.preventDefault();
        setPage('modelo');
        setMenuOpen(false);
        setTimeout(() => {
          const el = document.querySelector(href);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          else window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 60);
        return;
      }
      if (cotizar && page !== 'modelo') {
        e.preventDefault();
        setPage('modelo');
        setMenuOpen(false);
        setTimeout(() => {
          const el = document.querySelector('#cotizar');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 80);
        return;
      }
      const el = document.querySelector(href);
      if (el) {
        e.preventDefault();
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    };
    document.addEventListener('click', onClick);
    return () => document.removeEventListener('click', onClick);
  }, [page]);

  return (
    <div className="app" data-vp={tweaks.viewport} data-screen-label={page === 'home' ? '01 Home' : '02 Modelo'}>
      <div className="page-tabs">
        <button className={page === 'home' ? 'is-active' : ''} onClick={() => { setPage('home'); window.scrollTo({ top: 0 }); }}>HOME</button>
        <button className={page === 'modelo' ? 'is-active' : ''} onClick={() => { setPage('modelo'); window.scrollTo({ top: 0 }); }}>MODELO S06</button>
      </div>

      <Navbar onOpenMenu={() => setMenuOpen(true)} dark={page === 'modelo' ? false : false} />

      {page === 'home' ? <HomePage /> : <ModeloPage />}

      <Footer />

      <WhatsAppWidget phone="56912345678" />

      <MegaMenu open={menuOpen} onClose={() => setMenuOpen(false)} initialState={tweaks.menuState} />

      {window.TweaksPanel && (
        <TweaksPanel title="Tweaks">
          <TweakSection label="Viewport">
            <TweakRadio
              label="Tamaño de pantalla"
              value={tweaks.viewport}
              options={[{ label: "Desktop", value: "desktop" }, { label: "Mobile", value: "mobile" }]}
              onChange={(v) => setTweak('viewport', v)}
            />
          </TweakSection>
          <TweakSection label="Menú">
            <TweakRadio
              label="Estado inicial"
              value={tweaks.menuState}
              options={[{ label: "Inicial", value: "initial" }, { label: "Line-up completo", value: "lineup" }]}
              onChange={(v) => setTweak('menuState', v)}
            />
            <TweakButton label="Abrir menú" onClick={() => setMenuOpen(true)} />
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
