<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "viewport": "desktop",
  "menuState": "initial"
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [menuOpen, setMenuOpen] = React.useState(false);

  // Bloomreach — init + page_visit
  React.useEffect(() => {
    if (window.bloomreachService) {
      window.bloomreachService.initBloomreach();
      window.bloomreachService.trackEvent("page_visit", {
        page: "modelo-s09",
        url: window.location.href,
        title: document.title,
      });
    }
  }, []);

  // Scroll to hash on load
  React.useEffect(() => {
    const hash = window.location.hash;
    if (hash && hash.length > 1) {
      setTimeout(() => {
        const el = document.querySelector(hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 300);
    }
  }, []);

  // Smooth in-page anchor handling
  React.useEffect(() => {
    const onClick = (e) => {
      const a = e.target.closest('a[href^="#"]');
      if (!a) return;
      const href = a.getAttribute('href');
      if (href === '#' || href.length < 2) return;
      
      const el = document.querySelector(href);
      if (el) {
        e.preventDefault();
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    };
    document.addEventListener('click', onClick);
    return () => document.removeEventListener('click', onClick);
  }, []);

  return (
    <div className="app" data-vp={tweaks.viewport} data-screen-label="04 Modelo S09">
      <Navbar onOpenMenu={() => setMenuOpen(true)} dark={false} />

      <ModeloPlaceholderPage modelo="S09" />

      <Footer />

      <MegaMenu open={menuOpen} onClose={() => setMenuOpen(false)} initialState={tweaks.menuState} />

      {window.TweaksPanel && (
        <TweaksPanel title="Tweaks">
          <TweakSection title="Viewport">
            <TweakRadio
              label="Tamaño de pantalla"
              value={tweaks.viewport}
              options={[{ label: "Desktop", value: "desktop" }, { label: "Mobile", value: "mobile" }]}
              onChange={(v) => setTweak('viewport', v)}
            />
          </TweakSection>
          <TweakSection title="Menú">
            <TweakRadio
              label="Estado inicial"
              value={tweaks.menuState}
              options={[{ label: "Inicial", value: "initial" }, { label: "Line-up completo", value: "lineup" }]}
              onChange={(v) => setTweak('menuState', v)}
            />
            <TweakButton onClick={() => setMenuOpen(true)}>Abrir menú</TweakButton>
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- S09: patch de imágenes reales tras render (no toca ModeloPlaceholder.jsx) -->
<script>
(function () {
  const TARGETS = [
    // === Hero + Descripción: reemplazo de <img> ===
    { sel: 'img.mhero__bg', fn: (el) => {
        const target = "assets/s09/banner-desktop.webp";
        if (!el.src.endsWith(target)) el.src = target;
      } },
    { sel: 'img.desc__img', fn: (el) => {
        const target = "assets/s09/descripcion.webp";
        if (!el.src.endsWith(target)) el.src = target;
      } },
    // === Galería slider: marca el slide actual por aria-label / index ===
    { sel: '.gal__img', fn: (el) => {
        // Tomamos el índice desde el chip activo (no depende del texto)
        const chips = document.querySelectorAll('.gal__chip');
        let i = 0;
        chips.forEach((c, k) => { if (c.classList.contains('is-active')) i = k; });
        if (el.getAttribute('data-s09-slide') !== String(i)) {
          el.setAttribute('data-s09-slide', String(i));
        }
      } },
    // === Colores: detectar swatch activo + tab activa y proyectarlos al <body> ===
    { sel: '.col__swatch.is-active', fn: (el) => {
        const all = el.parentElement ? Array.from(el.parentElement.querySelectorAll('.col__swatch')) : [];
        const idx = all.indexOf(el);
        if (idx >= 0 && document.body.getAttribute('data-s09-color') !== String(idx)) {
          document.body.setAttribute('data-s09-color', String(idx));
        }
      } },
    { sel: '.col__tab.is-active', fn: (el) => {
        const t = el.textContent.trim();
        if (document.body.getAttribute('data-s09-coltab') !== t) {
          document.body.setAttribute('data-s09-coltab', t);
        }
      } },
  ];

  const apply = () => {
    TARGETS.forEach(({ sel, fn }) => {
      document.querySelectorAll(sel).forEach((el) => {
        try { fn(el); } catch (e) { /* noop */ }
      });
    });
  };

  const root = document.getElementById("root");
  let scheduled = false;
  const schedule = () => {
    if (scheduled) return;
    scheduled = true;
    requestAnimationFrame(() => { scheduled = false; apply(); });
  };
  new MutationObserver(schedule).observe(root, { childList: true, subtree: true, characterData: true });
  schedule();
})();
</script>
