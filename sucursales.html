// Adaptador: Strapi devuelve servicios como array y tipo_label como enum.
// La UI espera booleanos ventas/repuestos/servicio y tipo + tipoLabel.
// Esta función traduce un registro Strapi al shape que la UI ya entiende.
const adaptStrapiSucursal = (s) => {
  const servicios = Array.isArray(s.servicios) ? s.servicios : [];
  const ventas = servicios.includes('ventas');
  const repuestos = servicios.includes('repuestos');
  const servicio = servicios.includes('servicio');
  // "tipo" en la UI es el badge corto (Ventas / Repuestos / Servicio).
  // Lo derivamos del primer servicio activo, capitalizado.
  const primary = ventas ? 'Ventas' : repuestos ? 'Repuestos' : servicio ? 'Servicio' : '';
  return {
    id: s.id,
    nombre: s.nombre,
    direccion: s.direccion,
    comuna: s.comuna,
    region: s.region,
    tipo: primary,
    tipoLabel: s.tipo_label || 'Sala de ventas',
    horario: s.horario || '',
    lat: Number(s.lat),
    lng: Number(s.lng),
    ventas, repuestos, servicio,
  };
};

const SucursalesPage = () => {
  const [searchText, setSearchText] = React.useState("");
  const [selectedFilters, setSelectedFilters] = React.useState({
    ventas: false,
    repuestos: false,
    servicio: false
  });
  const [selectedSucursal, setSelectedSucursal] = React.useState(null);
  const [mapCenter, setMapCenter] = React.useState({ lat: -33.4489, lng: -70.6693 });

  // ── Carga desde Strapi con fallback embebido ──────────────────────────
  // - Si STRAPI_URL no está configurada → skip directo, usa SUCURSALES_FALLBACK.
  // - Si la llamada falla → useStrapi retorna fallback como data y deja error
  //   poblado para mostrar el banner de retry.
  const strapiConfigured = !!(window.ENV && window.ENV.STRAPI_URL);
  const { data: sucursalesRaw, loading, error, refetch } = useStrapi(
    () => window.strapiService.listSucursales(),
    [],
    { fallback: SUCURSALES_FALLBACK, skip: !strapiConfigured }
  );

  // Normalizar: si vienen de Strapi tienen shape distinto, si vienen del fallback
  // ya estan en el shape correcto. Detectamos por la presencia de "servicios" array.
  const sucursales = React.useMemo(() => {
    const arr = sucursalesRaw || [];
    return arr.map((s) => Array.isArray(s.servicios) ? adaptStrapiSucursal(s) : s);
  }, [sucursalesRaw]);

  const filtered = React.useMemo(() => {
    let result = sucursales;
    
    // Filtro de búsqueda por texto
    if (searchText.trim()) {
      const search = searchText.toLowerCase();
      result = result.filter(s => 
        s.nombre.toLowerCase().includes(search) ||
        s.comuna.toLowerCase().includes(search) ||
        s.direccion.toLowerCase().includes(search)
      );
    }
    
    // Filtros de tipo (ventas, repuestos, servicio)
    const hasActiveFilters = selectedFilters.ventas || selectedFilters.repuestos || selectedFilters.servicio;
    if (hasActiveFilters) {
      result = result.filter(s => 
        (selectedFilters.ventas && s.ventas) ||
        (selectedFilters.repuestos && s.repuestos) ||
        (selectedFilters.servicio && s.servicio)
      );
    }
    
    return result;
  }, [searchText, selectedFilters]);

  // Centrar mapa en sucursal seleccionada
  React.useEffect(() => {
    if (selectedSucursal) {
      setMapCenter({ lat: selectedSucursal.lat, lng: selectedSucursal.lng });
    } else if (filtered.length > 0) {
      // Centrar en el promedio de todas las sucursales filtradas
      const avgLat = filtered.reduce((sum, s) => sum + s.lat, 0) / filtered.length;
      const avgLng = filtered.reduce((sum, s) => sum + s.lng, 0) / filtered.length;
      setMapCenter({ lat: avgLat, lng: avgLng });
    }
  }, [selectedSucursal, filtered]);

  const toggleFilter = (filterName) => {
    setSelectedFilters(prev => ({
      ...prev,
      [filterName]: !prev[filterName]
    }));
  };

  const getComoLlegar = (sucursal) => {
    if (!sucursal) return;
    const address = encodeURIComponent(`${sucursal.direccion}, ${sucursal.comuna}, Chile`);
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${address}`, '_blank');
  };

  // Generar URL del mapa con marcadores
  const getMapUrl = () => {
    // Crear marcadores para todas las sucursales filtradas
    const markers = filtered.map(suc => `${suc.lat},${suc.lng}`).join('|');
    const center = `${mapCenter.lat},${mapCenter.lng}`;
    const zoom = selectedSucursal ? 14 : 6;
    
    // Usar Google Maps Embed API (iframe) que no requiere billing
    const baseUrl = 'https://www.google.com/maps/embed/v1/view';
    const params = new URLSearchParams({
      key: 'AIzaSyBFw0Qbyq9zTFTd-tUY6dZWTgaQzuU17R8',
      center: center,
      zoom: zoom
    });
    
    return `${baseUrl}?${params.toString()}`;
  };

  return (
    <>
      <section className="suc-map-view">
        {/* Panel lateral izquierdo */}
        <div className="suc-sidebar">
          {/* Buscador */}
          <div className="suc-search">
            <input 
              type="text" 
              placeholder="Ciudad / Comuna"
              value={searchText}
              onChange={(e) => setSearchText(e.target.value)}
            />
            <button className="suc-search-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="8" stroke="currentColor" strokeWidth="2"/>
                <path d="M21 21l-4.35-4.35" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
              </svg>
            </button>
          </div>

          {/* Filtros de tipo */}
          <div className="suc-filters">
            <label className="suc-filter-checkbox">
              <input 
                type="checkbox" 
                checked={selectedFilters.ventas}
                onChange={() => toggleFilter('ventas')}
              />
              <span>Ventas</span>
            </label>
            <label className="suc-filter-checkbox">
              <input 
                type="checkbox" 
                checked={selectedFilters.repuestos}
                onChange={() => toggleFilter('repuestos')}
              />
              <span>Repuestos</span>
            </label>
            <label className="suc-filter-checkbox">
              <input 
                type="checkbox" 
                checked={selectedFilters.servicio}
                onChange={() => toggleFilter('servicio')}
              />
              <span>Servicio</span>
            </label>
          </div>

          {/* Banner de error \u2014 solo si Strapi est\u00e1 configurado y fall\u00f3 */}
          {error && strapiConfigured && (
            <div className="suc-error">
              <div>
                <strong>No se pudo conectar al CMS.</strong>
                <span>Mostrando datos locales.</span>
              </div>
              <button onClick={refetch}>Reintentar</button>
            </div>
          )}

          {/* Lista de sucursales */}
          <div className="suc-list">
            {loading && (
              <>
                {[0, 1, 2, 3].map((i) => (
                  <div key={`skel-${i}`} className="suc-item suc-skel">
                    <div className="suc-skel-bar" style={{ width: '30%', height: 10 }}></div>
                    <div className="suc-skel-bar" style={{ width: '70%', height: 16, marginTop: 12 }}></div>
                    <div className="suc-skel-bar" style={{ width: '60%', height: 12, marginTop: 6 }}></div>
                    <div className="suc-skel-bar" style={{ width: '40%', height: 10, marginTop: 6 }}></div>
                  </div>
                ))}
              </>
            )}
            {!loading && filtered.length === 0 && (
              <div className="suc-no-results">
                <p>No hay resultados con los filtros actuales.</p>
              </div>
            )}
            {!loading && filtered.map((suc, i) => (
              <div 
                key={i} 
                className={`suc-item ${selectedSucursal === suc ? 'active' : ''}`}
                onClick={() => {
                  setSelectedSucursal(suc);
                  setMapCenter({ lat: suc.lat, lng: suc.lng });
                }}
              >
                <div className="suc-item-type">{suc.tipo}</div>
                <div className="suc-item-divider"></div>
                <div className="suc-item-content">
                  <div className="suc-item-icon">
                    <Icon name="pin" size={16} color="#E8490C" />
                  </div>
                  <div className="suc-item-info">
                    <a href="#" className="suc-item-link">Cómo llegar</a>
                  </div>
                </div>
                <h3 className="suc-item-name">{suc.nombre}</h3>
                <p className="suc-item-address">{suc.direccion}</p>
                <p className="suc-item-comuna">{suc.comuna}</p>
                {selectedSucursal === suc && (
                  <div className="suc-item-details">
                    <p className="suc-item-label">{suc.tipoLabel}</p>
                    <p className="suc-item-hours">{suc.horario}</p>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>

        {/* Mapa de Google */}
        <div className="suc-map">
          <iframe 
            className="suc-map-container"
            src={getMapUrl()}
            allowFullScreen
            loading="lazy"
            referrerPolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>

        <style>{`
          .suc-map-view { 
            display: grid; 
            grid-template-columns: 420px 1fr; 
            height: calc(100vh - var(--nav-h, 80px));

          }
          
          /* Sidebar */
          .suc-sidebar { 
            background: #fff;

          }

          }

          }

          }
          .suc-item-link:hover {
            text-decoration: underline;
          }
          .suc-item-name { 
            font-family: Montserrat; 
            font-weight: 700; 
            font-size: 16px; 
            color: #1A1A1A; 
            margin: 0 0 6px;
          }
          .suc-item-address { 
            font-size: 13px; 
            color: #666; 
            margin: 0 0 4px;
          }
          .suc-item-comuna { 
            font-size: 11px; 
            color: #999; 
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.02em;
          }
          .suc-item-details {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #E0E0E0;
          }
          .suc-item-label {
            font-size: 12px;
            color: #E8490C;
            font-weight: 600;
            margin: 0 0 4px;
          }
          .suc-item-hours {
            font-size: 12px;
            color: #666;
            margin: 0;
          }
          
          /* Mapa */
          .suc-map { 
            position: relative;
          }
          .suc-map-container { 
            width: 100%; 
            height: 100%;
            border: none;
          }
          
          /* Responsive */
          @media (max-width: 1023px) {
            .suc-map-view { 
              grid-template-columns: 1fr;
              grid-template-rows: 400px 1fr;
            }
            .suc-sidebar {
              border-right: none;
              border-bottom: 1px solid #E0E0E0;
            }
            .suc-list {
              max-height: 300px;
            }
          }
        `}</style>
      </section>
    </>
  );
};

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [menuOpen, setMenuOpen] = React.useState(false);

  React.useEffect(() => {
    if (window.bloomreachService) {
      window.bloomreachService.initBloomreach();
      window.bloomreachService.trackEvent("page_visit", {
        page: "sucursales",
        url: window.location.href,
        title: document.title,
      });
    }
  }, []);

  return (
    <div className="app" data-vp={tweaks.viewport} data-screen-label="03 Sucursales">
      <Navbar onOpenMenu={() => setMenuOpen(true)} dark={false} />

      <SucursalesPage />

      <Footer />

      <MegaMenu open={menuOpen} onClose={() => setMenuOpen(false)} initialState={tweaks.menuState} />

      {window.TweaksPanel && (
        <TweaksPanel title="Tweaks">
          <TweakSection title="Viewport">
            <TweakRadio
              label="Tamaño de pantalla"
              value={tweaks.viewport}
              options={[{ label: "Desktop", value: "desktop" }, { label: "Mobile", value: "mobile" }]}
              onChange={(v) => setTweak('viewport', v)}
            />
          </TweakSection>
          <TweakSection title="Menú">
            <TweakRadio
              label="Estado inicial"
              value={tweaks.menuState}
              options={[{ label: "Inicial", value: "initial" }, { label: "Line-up completo", value: "lineup" }]}
              onChange={(v) => setTweak('menuState', v)}
            />
            <TweakButton onClick={() => setMenuOpen(true)}>Abrir menú</TweakButton>
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
